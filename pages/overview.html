<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deriving Kepler's Law of Equal Areas - Overview</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
  <link rel="stylesheet" type="text/css" href="../assets/css/style_overview.css">

  <style>
    :root {
      --bg-space: #06070a;
      --card-bg: rgba(22, 27, 40, 0.5);
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-blue: #3b82f6;
    }

    body {
      background-color: var(--bg-space);
      background-image: radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 30px);
      background-size: 300px 300px;
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Elegant Hero Header */
    .hero-section {
      text-align: center;
      padding: 60px 20px;
      position: relative;
    }

    .hero-section h1 {
      font-size: 2.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
      background: linear-gradient(to right, #ffffff, #9ca3af);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .start-btn {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background: var(--accent-blue);
      padding: 12px 32px;
      border-radius: 8px;
      font-weight: 500;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(59, 130, 246, 0.5);
      color: #fff;
    }

    /* Modular Progress Roadmap Timeline */
    .roadmap-container {
      position: relative;
      max-width: 1100px;
      margin: 40px auto 100px;
      padding: 0 20px;
    }

    /* Central Tracing Connector Line for Desktop */
    .roadmap-container::before {
      content: '';
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: calc(100% - 240px);
      background: linear-gradient(to bottom, var(--accent-blue), rgba(255,255,255,0.05));
      z-index: 1;
    }

    .roadmap-node {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 80px;
      position: relative;
      z-index: 2;
      width: 100%;
    }

    /* Alternating side alignments */
    .roadmap-node:nth-child(even) {
      flex-direction: row-reverse;
    }

    .node-content {
      width: 45%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s ease;
      cursor: pointer;
    }

    .node-content:hover {
      transform: translateY(-4px);
      border-color: var(--accent-blue);
    }

    .node-thumbnail-wrapper {
      width: 100%;
      height: 180px;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      background: #000;
    }

    .node-thumbnail-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .node-content:hover .node-thumbnail-wrapper img {
      transform: scale(1.05);
    }

    .node-title {
      font-size: 1.2rem;
      font-weight: 500;
      color: #fff;
      text-align: center;
      margin: 0;
    }

    /* Center Timeline Badges */
    .node-badge {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 40px;
      background: #0d1117;
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .node-content:hover ~ .node-badge {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
    }

    /* Spacer placeholder for balanced layout grid mechanics */
    .node-spacer {
      width: 45%;
    }

    /* Responsive Mobile Overrides */
    @media (max-width: 768px) {
      .roadmap-container::before {
        left: 30px;
        top: 0;
        height: 100%;
      }

      .roadmap-node, .roadmap-node:nth-child(even) {
        flex-direction: column;
        align-items: flex-start;
        margin-bottom: 40px;
      }

      .node-content, .node-spacer {
        width: 100%;
      }

      .node-content {
        padding-left: 50px;
      }

      .node-badge {
        left: 30px;
        top: 24px;
        transform: translateX(-50%);
      }
    }
  </style>
</head>
<body>

  <div class="container-fluid">
    <header class="hero-section">
      <h1>Deriving Kepler’s Law of Equal Areas</h1>
      <a href="reality.html" class="start-btn">Let's Start Module</a>
    </header>

    <main class="roadmap-container">
      
      <div class="roadmap-node">
        <div class="node-content" onclick="window.location='reality.html';">
          <div class="node-thumbnail-wrapper">
            <img id="img1" src="../images/over1.jpeg" alt="Reality Preview">
          </div>
          <h2 class="node-title">1. Reality Check</h2>
        </div>
        <div class="node-badge">01</div>
        <div class="node-spacer"></div>
      </div>

      <div class="roadmap-node">
        <div class="node-content" onclick="window.location='idealization.html';">
          <div class="node-thumbnail-wrapper">
            <img id="img2" src="../images/over2.png" alt="Idealization Preview">
          </div>
          <h2 class="node-title">2. Idealization Stage</h2>
        </div>
        <div class="node-badge">02</div>
        <div class="node-spacer"></div>
      </div>

      <div class="roadmap-node">
        <div class="node-content" onclick="window.location='geometric.html';">
          <div class="node-thumbnail-wrapper">
            <img id="img4" src="../images/over4.png" alt="Geometric Framework Preview">
          </div>
          <h2 class="node-title">3. Geometric Structure</h2>
        </div>
        <div class="node-badge">03</div>
        <div class="node-spacer"></div>
      </div>

      <div class="roadmap-node">
        <div class="node-content" onclick="window.location='algebraic.html';">
          <div class="node-thumbnail-wrapper">
            <img id="img5" src="../images/over5.png" alt="Algebraic Logic Preview">
          </div>
          <h2 class="node-title">4. Algebraic Structure</h2>
        </div>
        <div class="node-badge">04</div>
        <div class="node-spacer"></div>
      </div>

    </main>
  </div>

  <script src="../assets/javascript/overview.js"></script>
</body>
</html>
